substitutions:
  device_name: esp-tracker-1
  friendly_name: "ESP Tracker 1"

  # Deep-sleep duration between position reports. Two cadences are used: the
  # device sleeps report_interval_near when the last fix was within
  # near_home_radius_m of home, and report_interval_far otherwise.
  report_interval_far: 30s
  report_interval_near: 10s
  # Time for the SIM7670G to become AT-responsive after the PWRKEY pulse.
  modem_boot_delay: 12s
  # GNSS fix acquisition per wake: gnss_fix_attempts * gnss_poll_interval = max wait.
  gnss_fix_attempts: "30"
  gnss_poll_interval: 4s

  # MQTT topic used on BOTH brokers (HA subscribes to it for the device_tracker).
  mqtt_topic: "tracker/esp-tracker-1/location"

  # On-device presence: the tracker compares each fix to this home location and
  # reports an "at home" diagnostic (and a "home" field in the MQTT payload).
  # Set these to your home coordinates; home_radius_m is the geofence radius.
  # near_home_radius_m is the larger zone that selects the faster sleep cadence.
  home_latitude: "-33.8688"
  home_longitude: "151.2093"
  home_radius_m: "100"
  near_home_radius_m: "1000"

# ---------------------------------------------------------------------------
# Away (cellular) broker credentials live in cellular.yaml (git-ignored) so the
# values can be injected into the AT-command lambda via substitutions. ESPHome
# cannot expand !secret inside a lambda, so a packages include is used instead.
# Copy cellular.yaml.example -> cellular.yaml and fill it in.
# ---------------------------------------------------------------------------
packages:
  cellular: !include cellular.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - tracker.h
  on_boot:
    # Block deep sleep until the tracking cycle decides to enter it.
    - priority: 800
      then:
        - lambda: 'id(prevent_sleep) = false;'
        - lambda: 'id(boot_done) = true;'
        - deep_sleep.prevent: deep_sleep_id
    # Pulse PWRKEY directly so the modem is booting while other components init.
    - priority: 700
      then:
        - output.turn_off: modem_reset_out
        - output.turn_on: modem_pwrkey_out
        - delay: 100ms
        - output.turn_off: modem_pwrkey_out
        - logger.log: "SIM7670G PWRKEY pulsed; modem booting"
    # Run the one-shot wake -> fix -> publish -> sleep cycle after setup.
    - priority: -100
      then:
        - script.execute: tracking_cycle

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# ---------------------------------------------------------------------------
# Deep sleep. No run_duration: sleep is entered explicitly from sleep_if_idle
# once the position has been published. The duration is chosen at enter time
# (report_interval_near when close to home, report_interval_far otherwise).
# ---------------------------------------------------------------------------
deep_sleep:
  id: deep_sleep_id
  sleep_duration: ${report_interval_far}

logger:
  level: DEBUG
  # GPIO43/44 (USB-CDC) is used for logging on T-SIM7670G-S3, modem UART is on GPIO10/11
  baud_rate: 115200

# Native ESPHome API — only reachable on the local LAN (when on Wi-Fi). Kept for
# local debugging / OTA. reboot_timeout 0s so the device never reboots itself
# while away from Wi-Fi.
api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s

# ---------------------------------------------------------------------------
# Home (LAN) MQTT broker — reached over Wi-Fi using ESPHome's built-in stack.
# Default is plain MQTT on port 1883 (Wi-Fi is already WPA2-encrypted); switch
# to port 8883 and add certificate_authority for broker TLS if desired.
# ---------------------------------------------------------------------------
mqtt:
  id: mqtt_home
  broker: !secret mqtt_home_host
  port: 1883
  username: !secret mqtt_home_user
  password: !secret mqtt_home_password
  discovery: false
  reboot_timeout: 0s
  # TLS to the home broker (optional):
  # port: 8883
  # certificate_authority: !secret mqtt_home_ca

# ---------------------------------------------------------------------------
# Direct UART to the SIM7670G modem for AT commands (GNSS + cellular MQTT).
# ---------------------------------------------------------------------------
uart:
  id: modem_uart
  tx_pin: GPIO11      # ESP32 TX  -> modem RX (MODEM_TX_PIN on LilyGo schematic)
  rx_pin: GPIO10      # ESP32 RX  <- modem TX (MODEM_RX_PIN on LilyGo schematic)
  baud_rate: 115200
  rx_buffer_size: 1024

# ---------------------------------------------------------------------------
# Modem hardware control: PWRKEY pulse + RESET helpers.
# ---------------------------------------------------------------------------
output:
  - platform: gpio
    id: modem_pwrkey_out
    pin: GPIO18
  - platform: gpio
    id: modem_reset_out
    pin:
      number: GPIO17
      inverted: true     # MODEM_RESET_LEVEL is LOW for this board

switch:
  - platform: output
    id: modem_pwrkey
    name: "Modem PWRKEY"
    output: modem_pwrkey_out
    internal: true
  - platform: output
    id: modem_reset
    name: "Modem Reset"
    output: modem_reset_out
    internal: true
  - platform: gpio
    id: status_led
    name: "Status LED"
    pin: GPIO12
  # Toggle ON over the API while on Wi-Fi to keep the device awake for OTA /
  # debugging instead of deep-sleeping after each report.
  - platform: template
    name: "Stay Awake (maintenance)"
    id: stay_awake
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(prevent_sleep) = true;'
    on_turn_off:
      # Drop the maintenance hold. Guarded by boot_done so the restore-time OFF
      # at boot never sleeps us.
      - lambda: 'id(prevent_sleep) = false;'
      - if:
          condition:
            lambda: 'return id(boot_done);'
          then:
            - script.execute: sleep_if_idle

globals:
  - id: gnss_powered_on
    type: bool
    restore_value: no
    initial_value: "false"
  - id: have_fix
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fix_attempts
    type: int
    restore_value: no
    initial_value: "0"
  - id: prevent_sleep
    type: bool
    restore_value: no
    initial_value: "false"
  - id: near_home
    type: bool
    restore_value: no
    initial_value: "false"
  - id: is_home
    type: bool
    restore_value: no
    initial_value: "false"
  - id: boot_done
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fix_payload
    type: std::string
    restore_value: no

# ---------------------------------------------------------------------------
# Position sensors. We parse AT+CGNSSINFO ourselves and publish into these
# template sensors, so the live position is available locally over the API when
# on Wi-Fi (in addition to being pushed via MQTT).
# ---------------------------------------------------------------------------
sensor:
  - platform: template
    name: "Latitude"
    id: gps_lat
    accuracy_decimals: 6
    unit_of_measurement: "°"
    update_interval: never
  - platform: template
    name: "Longitude"
    id: gps_lon
    accuracy_decimals: 6
    unit_of_measurement: "°"
    update_interval: never
  - platform: template
    name: "Altitude"
    id: gps_alt
    accuracy_decimals: 1
    unit_of_measurement: "m"
    update_interval: never
  - platform: template
    name: "Speed"
    id: gps_spd
    accuracy_decimals: 1
    unit_of_measurement: "km/h"
    update_interval: never
  - platform: template
    name: "Course"
    id: gps_cog
    accuracy_decimals: 1
    unit_of_measurement: "°"
    update_interval: never
  - platform: template
    name: "GPS Satellites"
    id: gps_sats
    accuracy_decimals: 0
    update_interval: never

  - platform: adc
    pin: GPIO4
    id: batt_voltage
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0    # on-board 1:1 divider
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"

# ---------------------------------------------------------------------------
# Tracking scripts.
#   poll_gnss    - one AT+CGNSSINFO poll: parse, update sensors + fix_payload.
#   publish_fix  - push the current fix_payload (home broker, else cellular).
#   tracking_cycle - one-shot wake -> fix -> publish -> deep sleep.
#   sleep_if_idle  - power GNSS down and deep-sleep (near/far cadence).
# ---------------------------------------------------------------------------
script:
  - id: poll_gnss
    mode: single
    then:
      - lambda: |-
          id(fix_attempts) += 1;
          std::string resp = tracker::send_at(id(modem_uart), "AT+CGNSSINFO", 1000);
          ESP_LOGD("GNSS", "Raw CGNSSINFO (try %d): '%s'", id(fix_attempts), resp.c_str());
          if (resp.find("OK") == std::string::npos) {
            ESP_LOGW("GNSS", "AT+CGNSSINFO failed: %s", resp.c_str());
            return;
          }
          size_t hdr = resp.find("+CGNSSINFO:");
          if (hdr == std::string::npos) { ESP_LOGI("GNSS", "No GNSS fix yet"); return; }

          auto split_csv = [](const std::string &s) {
            std::vector<std::string> out; size_t start = 0;
            while (true) {
              size_t pos = s.find(',', start);
              if (pos == std::string::npos) { out.push_back(s.substr(start)); break; }
              out.push_back(s.substr(start, pos - start)); start = pos + 1;
            }
            return out;
          };
          auto to_double = [](const std::string &s) -> double { return s.empty() ? NAN : atof(s.c_str()); };
          auto to_int = [](const std::string &s) -> int { return s.empty() ? 0 : atoi(s.c_str()); };

          size_t colon = resp.find(':', hdr);
          if (colon == std::string::npos) return;
          size_t eol = resp.find('\r', colon);
          std::string body = resp.substr(colon + 1, (eol == std::string::npos) ? std::string::npos : eol - colon - 1);
          while (!body.empty() && body[0] == ' ') body.erase(0, 1);

          auto p = split_csv(body);
          if (p.size() == 17) p.push_back("");   // some firmwares omit sat_used
          if (p.size() < 18) { ESP_LOGI("GNSS", "No GNSS fix yet"); return; }

          // CGNSSINFO returns signed-magnitude decimal degrees plus N/S, E/W.
          double lat = to_double(p[5]);
          std::string lat_dir = p[6].empty() ? "N" : p[6];
          double lon = to_double(p[7]);
          std::string lon_dir = p[8].empty() ? "E" : p[8];
          std::string date_str = p[9];
          std::string time_str = p[10];
          double alt_m = to_double(p[11]);
          double spd   = to_double(p[12]);
          double cog   = to_double(p[13]);
          double hdop  = to_double(p[15]);
          int    sat_used = to_int(p[17]);

          bool valid = std::isfinite(lat) && std::isfinite(lon) &&
                       !date_str.empty() && !time_str.empty();
          if (!valid) { ESP_LOGI("GNSS", "No GNSS fix yet"); return; }

          double slat = (lat_dir[0] == 'S' || lat_dir[0] == 's') ? -lat : lat;
          double slon = (lon_dir[0] == 'W' || lon_dir[0] == 'w') ? -lon : lon;
          double acc  = std::isfinite(hdop) ? hdop * 5.0 : 0.0;   // rough metres from HDOP
          double batt = id(batt_voltage).has_state() ? id(batt_voltage).state : NAN;

          // On-device presence: great-circle (haversine) distance to home.
          const double PI = 3.14159265358979323846;
          double hlat = ${home_latitude};
          double hlon = ${home_longitude};
          double dlat = (slat - hlat) * PI / 180.0;
          double dlon = (slon - hlon) * PI / 180.0;
          double ha = sin(dlat / 2) * sin(dlat / 2) +
                      cos(hlat * PI / 180.0) * cos(slat * PI / 180.0) *
                      sin(dlon / 2) * sin(dlon / 2);
          double dist_home = 2.0 * 6371000.0 * asin(sqrt(ha));
          bool at_home = dist_home <= ${home_radius_m};
          id(is_home) = at_home;
          id(near_home) = dist_home <= ${near_home_radius_m};

          // Publish to local sensors (visible over the API on Wi-Fi).
          id(gps_lat).publish_state(slat);
          id(gps_lon).publish_state(slon);
          if (std::isfinite(alt_m)) id(gps_alt).publish_state(alt_m);
          if (std::isfinite(spd))   id(gps_spd).publish_state(spd);
          if (std::isfinite(cog))   id(gps_cog).publish_state(cog);
          id(gps_sats).publish_state(sat_used);
          id(home_presence).publish_state(at_home);

          // Build the JSON payload published to Home Assistant.
          char json[256];
          int n = snprintf(json, sizeof(json),
            "{\"latitude\":%.6f,\"longitude\":%.6f,\"gps_accuracy\":%.1f,"
            "\"altitude\":%.1f,\"speed\":%.1f,\"course\":%.1f,\"satellites\":%d",
            slat, slon, acc,
            std::isfinite(alt_m) ? alt_m : 0.0,
            std::isfinite(spd) ? spd : 0.0,
            std::isfinite(cog) ? cog : 0.0, sat_used);
          if (std::isfinite(batt))
            n += snprintf(json + n, sizeof(json) - n, ",\"battery\":%.2f", batt);
          n += snprintf(json + n, sizeof(json) - n, ",\"home\":%s", at_home ? "true" : "false");
          snprintf(json + n, sizeof(json) - n, "}");
          id(fix_payload) = json;
          id(have_fix) = true;
          ESP_LOGI("GNSS", "Fix acquired (%.0f m from home, home=%d): %s",
                   dist_home, at_home, json);

  - id: publish_fix
    mode: single
    then:
      # Prefer the home broker over Wi-Fi, fall back to cellular.
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "Wi-Fi up — publishing to home broker"
            - wait_until:
                condition:
                  lambda: 'return id(mqtt_home)->is_connected();'
                timeout: 15s
            - if:
                condition:
                  lambda: 'return id(mqtt_home)->is_connected();'
                then:
                  - mqtt.publish:
                      topic: ${mqtt_topic}
                      payload: !lambda 'return id(fix_payload);'
                      qos: 1
                      retain: true
                else:
                  - logger.log: "Home broker unreachable — using cellular"
                  - lambda: |-
                      tracker::publish_away(id(modem_uart),
                        "${mqtt_away_host}", ${mqtt_away_port},
                        "${mqtt_away_clientid}", "${mqtt_away_user}", "${mqtt_away_password}",
                        "${mqtt_topic}", id(fix_payload),
                        ${mqtt_away_authmode}, "${mqtt_away_cafile}");
          else:
            - logger.log: "No Wi-Fi — publishing to away broker over cellular"
            - lambda: |-
                tracker::publish_away(id(modem_uart),
                  "${mqtt_away_host}", ${mqtt_away_port},
                  "${mqtt_away_clientid}", "${mqtt_away_user}", "${mqtt_away_password}",
                  "${mqtt_topic}", id(fix_payload),
                  ${mqtt_away_authmode}, "${mqtt_away_cafile}");

  - id: tracking_cycle
    mode: single
    then:
      - logger.log: "Tracking cycle started"
      - delay: ${modem_boot_delay}
      - lambda: |-
          tracker::gnss_power_on(id(modem_uart), id(gnss_powered_on));
          id(have_fix) = false;
          id(fix_attempts) = 0;

      # Poll the GNSS engine until we get a valid fix or run out of attempts.
      - while:
          condition:
            lambda: 'return !id(have_fix) && id(fix_attempts) < ${gnss_fix_attempts};'
          then:
            - script.execute: poll_gnss
            - wait_until:
                condition:
                  not:
                    script.is_running: poll_gnss
            - if:
                condition:
                  lambda: 'return !id(have_fix);'
                then:
                  - delay: ${gnss_poll_interval}

      - if:
          condition:
            lambda: 'return id(have_fix);'
          then:
            - script.execute: publish_fix
            - wait_until:
                condition:
                  not:
                    script.is_running: publish_fix
          else:
            - logger.log: "No GNSS fix this cycle — sleeping and retrying next wake"

      # Power GNSS down and deep-sleep unless the "Stay Awake" switch is holding
      # us awake. Sleep duration depends on proximity to home.
      - script.execute: sleep_if_idle

  # Power GNSS down, then deep-sleep only if nothing is holding the device awake
  # ("Stay Awake"). The sleep duration is report_interval_near when the last fix
  # was within near_home_radius_m of home, report_interval_far otherwise. Shared
  # by tracking_cycle and the Stay Awake switch.
  - id: sleep_if_idle
    mode: single
    then:
      - lambda: 'tracker::gnss_power_off(id(modem_uart));'
      - if:
          condition:
            lambda: 'return !id(prevent_sleep);'
          then:
            - if:
                condition:
                  lambda: 'return id(near_home);'
                then:
                  - logger.log: "Nothing holding awake — deep sleep (near home)"
                  - deep_sleep.enter:
                      id: deep_sleep_id
                      sleep_duration: ${report_interval_near}
                else:
                  - logger.log: "Nothing holding awake — deep sleep (away)"
                  - deep_sleep.enter:
                      id: deep_sleep_id
                      sleep_duration: ${report_interval_far}
          else:
            - logger.log: "Staying awake (Stay Awake active)"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
    ssid:
      name: "WiFi SSID"
  - platform: version
    name: "ESPHome Version"

binary_sensor:
  - platform: status
    name: "Status"

  # On-device presence diagnostic: ON when the latest fix is within
  # home_radius_m of (home_latitude, home_longitude). Updated by poll_gnss.
  - platform: template
    id: home_presence
    name: "Located at Home"
    device_class: presence
    entity_category: diagnostic

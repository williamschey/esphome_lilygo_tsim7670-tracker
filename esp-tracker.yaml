substitutions:
  device_name: esp-tracker-1
  friendly_name: "ESP Tracker 1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    # Pulse PWRKEY directly so the modem is booting while other components init.
    # The SIM7670 takes ~12s to be AT-responsive; first GNSS poll happens at 20s.
    priority: 700
    then:
      - output.turn_off: modem_reset_out
      - output.turn_on: modem_pwrkey_out
      - delay: 100ms
      - output.turn_off: modem_pwrkey_out
      - logger.log: "SIM7670G PWRKEY pulsed; modem booting in background"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO
  # GPIO43/44 (USB-CDC) is used for logging on T-SIM7670G-S3, modem UART is on GPIO10/11
  baud_rate: 115200

# ---------------------------------------------------------------------------
# External components.
#
# We deliberately do NOT pull in the modem PPP component (PR#6721): its
# blocking DATA_MODE-exit retries make the Home Assistant API unreachable.
# GPS data is fetched directly via AT commands over a plain UART.
# ---------------------------------------------------------------------------
external_components:
  - source: github://oarcher/piotech@main
    components: [ nulluart ]
    refresh: 1d

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ---------------------------------------------------------------------------
# Direct UART to the SIM7670G modem for AT commands (used for GNSS only).
# ---------------------------------------------------------------------------
uart:
  id: modem_uart
  tx_pin: GPIO11      # ESP32 TX  → modem RX (MODEM_TX_PIN on LilyGo schematic)
  rx_pin: GPIO10      # ESP32 RX  ← modem TX (MODEM_RX_PIN on LilyGo schematic)
  baud_rate: 115200
  rx_buffer_size: 1024

# ---------------------------------------------------------------------------
# Modem hardware control: PWRKEY pulse + RESET helpers.
# Power-on sequence per LilyGo T-SIM7670G-S3 schematic: pulse PWRKEY high for
# ~100 ms, wait ~12 s for the modem firmware to come up.
# ---------------------------------------------------------------------------
output:
  - platform: gpio
    id: modem_pwrkey_out
    pin: GPIO18
  - platform: gpio
    id: modem_reset_out
    pin:
      number: GPIO17
      inverted: true     # MODEM_RESET_LEVEL is LOW for this board

switch:
  - platform: output
    id: modem_pwrkey
    name: "Modem PWRKEY"
    output: modem_pwrkey_out
    internal: true
  - platform: output
    id: modem_reset
    name: "Modem Reset"
    output: modem_reset_out
    internal: true
  - platform: gpio
    id: status_led
    name: "Status LED"
    pin: GPIO12

script:
  - id: modem_power_on
    mode: single
    then:
      - logger.log: "Powering on SIM7670G…"
      - switch.turn_on: modem_pwrkey
      - delay: 100ms
      - switch.turn_off: modem_pwrkey
      - delay: 12s
      - logger.log: "SIM7670G boot sequence complete"

  - id: modem_power_off
    mode: single
    then:
      - logger.log: "Powering off SIM7670G…"
      - switch.turn_on: modem_pwrkey
      - delay: 2700ms
      - switch.turn_off: modem_pwrkey

button:
  - platform: template
    name: "Reboot Modem"
    on_press:
      - script.execute: modem_power_off
      - delay: 3s
      - script.execute: modem_power_on

# ---------------------------------------------------------------------------
# GPS — the SIM7670 doesn't expose NMEA via URC, so we poll AT+CGNSSINFO and
# synthesize NMEA sentences fed into the standard ESPHome gps component.
# ---------------------------------------------------------------------------
nulluart:
  id: nulluart_id
  on_update:
    - component.update: gps_id

gps:
  uart_id: nulluart_id
  id: gps_id
  latitude:
    name: "Latitude"
    id: gps_lat
    accuracy_decimals: 6
  longitude:
    name: "Longitude"
    id: gps_lon
    accuracy_decimals: 6
  altitude:
    name: "Altitude"
  speed:
    name: "Speed"
  course:
    name: "Course"
  satellites:
    name: "GPS Satellites"
  hdop:
    name: "GPS HDOP"
  update_interval: never

time:
  - platform: gps
    id: gps_time

globals:
  - id: gnss_powered_on
    type: bool
    restore_value: no
    initial_value: "false"

# Poll the modem's GNSS engine every 20 s and feed synthesized NMEA into gps.
interval:
  - interval: 20s
    then:
      - lambda: |-
          // Send an AT command and wait up to `timeout_ms` for OK/ERROR.
          // Returns the full response text (may be empty if the modem hasn't booted).
          auto send_at = [](const std::string &cmd, uint32_t timeout_ms) -> std::string {
            // Drain any leftover RX bytes
            uint8_t scratch[64];
            while (id(modem_uart).available() > 0) {
              size_t n = std::min<size_t>(64, id(modem_uart).available());
              id(modem_uart).read_array(scratch, n);
            }
            std::string full = cmd + "\r\n";
            id(modem_uart).write_array(reinterpret_cast<const uint8_t *>(full.c_str()), full.size());
            std::string out;
            uint32_t start = millis();
            while (millis() - start < timeout_ms) {
              while (id(modem_uart).available() > 0) {
                uint8_t b;
                if (id(modem_uart).read_byte(&b)) out += static_cast<char>(b);
              }
              if (out.find("\r\nOK\r\n") != std::string::npos ||
                  out.find("\r\nERROR") != std::string::npos) {
                break;
              }
              delay(10);
            }
            return out;
          };

          // GNSS works without a SIM, so power it on as soon as the modem responds.
          if (!id(gnss_powered_on)) {
            std::string pwr = send_at("AT+CGNSSPWR=1", 1000);
            if (pwr.find("OK") != std::string::npos) {
              ESP_LOGI("GNSS", "GNSS engine powered on");
              id(gnss_powered_on) = true;
            } else {
              ESP_LOGD("GNSS", "Modem not yet ready for GNSS power-on");
              return;
            }
          }

          std::string resp = send_at("AT+CGNSSINFO", 1000);
          if (resp.find("OK") == std::string::npos) {
            ESP_LOGW("GNSS", "AT+CGNSSINFO failed: %s", resp.c_str());
            return;
          }
          size_t hdr = resp.find("+CGNSSINFO:");
          if (hdr == std::string::npos) {
            ESP_LOGI("GNSS", "No GNSS fix yet");
            return;
          }

          auto checksum = [](const std::string &s) -> uint8_t {
            uint8_t cs = 0;
            for (char c : s) cs ^= static_cast<uint8_t>(c);
            return cs;
          };
          auto split_csv = [](const std::string &s) {
            std::vector<std::string> out;
            size_t start = 0;
            while (true) {
              size_t pos = s.find(',', start);
              if (pos == std::string::npos) { out.push_back(s.substr(start)); break; }
              out.push_back(s.substr(start, pos - start));
              start = pos + 1;
            }
            return out;
          };
          auto to_double = [](const std::string &s) -> double { return s.empty() ? NAN : atof(s.c_str()); };
          auto to_int = [](const std::string &s) -> int { return s.empty() ? 0 : atoi(s.c_str()); };
          auto decdeg_to_nmea = [](double deg, bool is_lat) -> std::string {
            if (!std::isfinite(deg)) return "";
            double a = fabs(deg);
            int d = (int) floor(a);
            double m = (a - d) * 60.0;
            char buf[24];
            if (is_lat) snprintf(buf, sizeof(buf), "%02d%07.4f", d, m);
            else        snprintf(buf, sizeof(buf), "%03d%07.4f", d, m);
            return std::string(buf);
          };

          // Extract just the "+CGNSSINFO: ..." line
          size_t colon = resp.find(':', hdr);
          if (colon == std::string::npos) return;
          size_t eol = resp.find('\r', colon);
          std::string body = resp.substr(colon + 1, (eol == std::string::npos) ? std::string::npos : eol - colon - 1);
          while (!body.empty() && body[0] == ' ') body.erase(0, 1);

          auto p = split_csv(body);
          if (p.size() == 17) p.push_back("");   // some firmwares omit sat_used
          if (p.size() < 18) {
            ESP_LOGW("GNSS", "CGNSSINFO malformed: %s", body.c_str());
            return;
          }

          double lat = to_double(p[5]);
          std::string lat_dir = p[6].empty() ? "N" : p[6];
          double lon = to_double(p[7]);
          std::string lon_dir = p[8].empty() ? "E" : p[8];
          std::string date_str = p[9];
          std::string time_str = p[10];
          double alt_m = to_double(p[11]);
          double spd   = to_double(p[12]);
          double cog   = to_double(p[13]);
          double hdop  = to_double(p[15]);
          int    sat_used = to_int(p[17]);

          std::string lat_ddmm = decdeg_to_nmea(lat, true);
          std::string lon_ddmm = decdeg_to_nmea(lon, false);
          bool valid = !lat_ddmm.empty() && !lon_ddmm.empty() &&
                       !date_str.empty() && !time_str.empty();
          int fix_quality = valid ? 1 : 0;
          char sat_str[4];
          snprintf(sat_str, sizeof(sat_str), "%02d", sat_used > 99 ? 99 : sat_used);

          char gga[160], rmc[160];
          snprintf(gga, sizeof(gga),
                   "GPGGA,%s,%s,%c,%s,%c,%d,%s,%.1f,%.1f,M,,M,,",
                   time_str.c_str(),
                   lat_ddmm.c_str(), lat_dir[0],
                   lon_ddmm.c_str(), lon_dir[0],
                   fix_quality, sat_str,
                   std::isfinite(hdop) ? hdop : 0.0,
                   std::isfinite(alt_m) ? alt_m : 0.0);
          snprintf(rmc, sizeof(rmc),
                   "GPRMC,%s,%c,%s,%c,%s,%c,%.1f,%.1f,%s,,,",
                   time_str.c_str(),
                   valid ? 'A' : 'V',
                   lat_ddmm.c_str(), lat_dir[0],
                   lon_ddmm.c_str(), lon_dir[0],
                   std::isfinite(spd) ? spd : 0.0,
                   std::isfinite(cog) ? cog : 0.0,
                   date_str.c_str());

          char full_gga[176], full_rmc[176];
          snprintf(full_gga, sizeof(full_gga), "$%s*%02X\r\n", gga, checksum(gga));
          snprintf(full_rmc, sizeof(full_rmc), "$%s*%02X\r\n", rmc, checksum(rmc));
          id(nulluart_id)->write_array((const uint8_t *) full_gga, strlen(full_gga));
          id(nulluart_id)->write_array((const uint8_t *) full_rmc, strlen(full_rmc));
          id(gps_id)->update();

# ---------------------------------------------------------------------------
# Diagnostics
# ---------------------------------------------------------------------------
sensor:
  - platform: adc
    pin: GPIO4
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0    # on-board 1:1 divider
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "WiFi IP"
    ssid:
      name: "WiFi SSID"
  - platform: version
    name: "ESPHome Version"

binary_sensor:
  - platform: status
    name: "Status"

